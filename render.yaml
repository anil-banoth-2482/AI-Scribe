services:
  - type: web
    name: chitask-backend
    env: python
    pythonVersion: 3.11
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn server:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000 --timeout 120 --workers 1
    memoryMB: 512
    envVars:
      - key: PORT
        value: "10000"
