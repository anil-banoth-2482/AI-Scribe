services:
  - type: web
    name: chitask-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000 --timeout 120 --workers 1
    memoryMB: 512
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
